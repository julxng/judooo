<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judooo — Strategy Q2 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* PASSWORD GATE */
#gate {
  position: fixed; inset: 0; z-index: 9999;
  background: #f5f4f0;
  display: flex; align-items: center; justify-content: center;
}
.gate-box {
  background: #fff; border: 1px solid #e5e5e0; border-radius: 16px;
  padding: 40px 44px; width: 380px; text-align: center;
  box-shadow: 0 4px 32px rgba(0,0,0,.08);
}
.gate-logo { margin-bottom: 24px; }
.gate-logo svg { height: 28px; width: auto; }
.gate-title { font-size: 17px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
.gate-sub { font-size: 13px; color: #888; margin-bottom: 24px; }
.gate-input {
  width: 100%; padding: 11px 14px; border: 1.5px solid #e5e5e0; border-radius: 8px;
  font-size: 15px; font-family: inherit; outline: none; margin-bottom: 12px;
  transition: border-color .15s;
}
.gate-input:focus { border-color: #eb4422; }
.gate-btn {
  width: 100%; padding: 11px; background: #1a1a1a; color: #fff;
  border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: background .15s;
}
.gate-btn:hover { background: #eb4422; }
.gate-err { font-size: 12px; color: #c62828; margin-top: 8px; min-height: 18px; }

:root {
  --orange: #eb4422;
  --black: #1a1a1a;
  --bg: #f5f4f0;
  --white: #ffffff;
  --border: #e5e5e0;
  --muted: #888;
  --light: #f9f9f7;
  --nav-h: 60px;
  --green: #2e7d32;
  --red: #c62828;
  --blue: #1565c0;
  --amber: #f57f17;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--black); font-size: 15px; }

/* NAV */
.nav {
  position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
  background: var(--white); border-bottom: 1px solid var(--border);
  z-index: 200; display: flex; align-items: center; gap: 20px; padding: 0 28px;
}
.nav-logo svg { height: 26px; width: auto; display: block; }
.nav-sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
.nav-pills { display: flex; gap: 2px; flex: 1; overflow-x: auto; scrollbar-width: none; }
.nav-pills::-webkit-scrollbar { display: none; }
.pill {
  padding: 5px 11px; border-radius: 6px; font-size: 12px; font-weight: 500;
  cursor: pointer; color: #666; white-space: nowrap; border: none; background: none;
  transition: all .15s;
}
.pill:hover { background: #f0f0ee; color: var(--black); }
.pill.active { background: var(--black); color: #fff; }
.nav-right { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.lang-btn {
  padding: 5px 11px; border-radius: 6px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1.5px solid var(--border); background: var(--white);
  color: #555; transition: all .15s;
}
.lang-btn.active { border-color: var(--orange); color: var(--orange); background: #fff5f3; }
.slide-counter { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

/* MAIN */
.main { padding-top: var(--nav-h); }
.slide { display: none; min-height: calc(100vh - var(--nav-h)); padding: 48px 64px 88px; max-width: 1280px; margin: 0 auto; }
.slide.active { display: block; }

/* TYPE */
.eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.h1 { font-size: 38px; font-weight: 900; letter-spacing: -1.5px; line-height: 1.05; margin-bottom: 8px; }
.subhead { font-size: 16px; color: #555; line-height: 1.55; margin-bottom: 36px; }
.section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 14px; }
p { font-size: 15px; line-height: 1.65; color: #444; }

/* GRID */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
.g5 { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; }

/* CARDS */
.card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 22px 24px; }
.card-dark { background: var(--black); border: none; border-radius: 12px; padding: 24px; color: #fff; }

/* KPI CARDS */
.kpi { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; }
.kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 6px; }
.kpi-val { font-size: 30px; font-weight: 900; letter-spacing: -1.5px; }
.kpi-val.orange { color: var(--orange); }
.kpi-sub { font-size: 12px; color: #999; margin-top: 3px; }

/* BADGES */
.badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.b-green { background: #e8f5e9; color: #2e7d32; }
.b-red { background: #fde8e8; color: #c62828; }
.b-amber { background: #fff8e1; color: #e65100; }
.b-blue { background: #e3f2fd; color: #1565c0; }
.b-grey { background: #f0f0ee; color: #555; }
.b-orange { background: #fff2ef; color: var(--orange); }
.b-purple { background: #f3e5f5; color: #6a1b9a; }

/* TABLE */
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { text-align: left; padding: 10px 13px; background: var(--bg); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); border-bottom: 2px solid var(--border); }
td { padding: 12px 13px; border-bottom: 1px solid #f2f2f0; vertical-align: top; color: #333; line-height: 1.45; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafaf8; }
td strong { font-weight: 600; color: var(--black); }

/* CHARTS */
.chart-wrap { position: relative; }
.chart-title { font-size: 13px; font-weight: 700; color: var(--black); margin-bottom: 4px; }
.chart-sub { font-size: 11px; color: var(--muted); margin-bottom: 16px; }

/* MISSION */
.mission-box { background: var(--black); color: #fff; border-radius: 16px; padding: 40px 44px; text-align: center; margin-bottom: 28px; }
.mission-vn { font-size: 26px; font-weight: 900; letter-spacing: -.5px; line-height: 1.25; margin-bottom: 12px; }
.mission-en { font-size: 15px; color: #888; font-style: italic; }

/* PHASE TIMELINE */
.phase-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 0; }
.phase { padding: 20px 18px; border-right: 1px solid var(--border); }
.phase:last-child { border-right: none; }
.phase-year { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
.phase-name { font-size: 15px; font-weight: 800; margin-bottom: 12px; color: var(--black); line-height: 1.2; }
.phase-rev { font-size: 22px; font-weight: 900; letter-spacing: -1px; color: var(--orange); margin-bottom: 8px; }
.phase-items { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.phase-items li { font-size: 12px; color: #555; display: flex; gap: 6px; }
.phase-items li::before { content: "→"; color: #ccc; flex-shrink: 0; }

/* OKR */
.okr-block { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 14px; }
.okr-o { font-size: 14px; font-weight: 800; color: var(--black); margin-bottom: 14px; display: flex; align-items: flex-start; gap: 10px; }
.okr-kr { display: flex; gap: 12px; padding: 9px 0; border-bottom: 1px solid #f5f5f3; font-size: 14px; color: #444; line-height: 1.45; }
.okr-kr:last-child { border-bottom: none; padding-bottom: 0; }
.kr-n { font-size: 10px; font-weight: 800; color: #999; background: #f0f0ee; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.kr-target { font-weight: 700; color: var(--black); }

/* COMPETITIVE */
.matrix-wrap { position: relative; background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }

/* RISK */
.risk-level { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
.risk-high { background: #e53935; }
.risk-med { background: #fb8c00; }
.risk-low { background: #43a047; }

/* GANTT */
.gantt-wrap { overflow-x: auto; }
.gantt-table { width: 100%; border-collapse: collapse; min-width: 900px; }
.gantt-table th { background: var(--bg); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); padding: 8px 6px; text-align: center; border-bottom: 2px solid var(--border); white-space: nowrap; }
.gantt-table th.g-label { text-align: left; padding-left: 10px; width: 170px; }
.gantt-table td { padding: 5px 4px; border-bottom: 1px solid #f0f0ee; height: 38px; }
.gantt-table td.g-label { font-size: 12px; font-weight: 700; color: var(--black); padding: 0 8px; white-space: nowrap; border-right: 2px solid var(--border); }
.gantt-table td.g-label .g-sub { font-size: 11px; font-weight: 400; color: var(--muted); display: block; }
.gbar { height: 26px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 6px; }
.gbar-green { background: #c8e6c9; color: #1b5e20; }
.gbar-blue { background: #bbdefb; color: #0d47a1; }
.gbar-purple { background: #e1bee7; color: #4a148c; }
.gbar-orange { background: #ffe0b2; color: #bf360c; }
.gbar-amber { background: #fff9c4; color: #827717; border: 1px solid #f9a825; }
.gbar-red { background: var(--orange); color: #fff; }
.gbar-dark { background: #cfd8dc; color: #263238; }
.gantt-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 14px; }
.g-leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
.g-leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

/* FINANCIAL TABLE */
.fin-table { font-size: 13px; }
.fin-table th { font-size: 10px; }
.fin-table td { padding: 9px 10px; font-variant-numeric: tabular-nums; }
.fin-table tr.highlight-yr td { background: #fff8f6; font-weight: 700; }
.fin-table tr.highlight-yr td:first-child { color: var(--orange); }

/* NAV ARROWS */
.nav-arrows { position: fixed; bottom: 24px; right: 28px; display: flex; gap: 8px; z-index: 100; }
.arr-btn {
  width: 40px; height: 40px; border-radius: 50%; background: var(--white);
  border: 1px solid var(--border); cursor: pointer; font-size: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.1); transition: all .15s;
  display: flex; align-items: center; justify-content: center;
}
.arr-btn:hover { background: var(--black); color: #fff; border-color: var(--black); }

/* UTIL */
.divider { height: 1px; background: var(--border); margin: 28px 0; }
.mt8 { margin-top: 8px; } .mt16 { margin-top: 16px; } .mt24 { margin-top: 24px; } .mt32 { margin-top: 32px; }
.mb8 { margin-bottom: 8px; } .mb16 { margin-bottom: 16px; } .mb24 { margin-bottom: 24px; }
.flex { display: flex; } .gap8 { gap: 8px; } .gap12 { gap: 12px; } .items-center { align-items: center; }
.highlight-box { border-radius: 8px; padding: 14px 16px; }
.highlight-amber { background: #fff8e1; border-left: 3px solid #ffb300; }
.highlight-green { background: #e8f5e9; border-left: 3px solid #43a047; }
.highlight-red { background: #fde8e8; border-left: 3px solid #e53935; }
.highlight-blue { background: #e3f2fd; border-left: 3px solid #1e88e5; }
.fn { font-size: 11px; color: var(--muted); font-style: italic; }
.num { font-variant-numeric: tabular-nums; }
</style>
</head>

<script>
(function(){
  const PW = btoa('#1Fortons');
  if(sessionStorage.getItem('jdeck')==PW){
    document.getElementById('gate').style.display='none';
  }
  window.checkPass = function(){
    const v = document.getElementById('gateInput').value;
    if(btoa(v)===PW){
      sessionStorage.setItem('jdeck',PW);
      document.getElementById('gate').style.display='none';
    } else {
      document.getElementById('gateErr').textContent='Incorrect password.';
      document.getElementById('gateInput').value='';
      document.getElementById('gateInput').focus();
    }
  };
  document.addEventListener('keydown',function(e){
    if(e.key==='Enter' && document.getElementById('gate').style.display!=='none') checkPass();
  });
})();
</script>

// ─── PILLS ────────────────────────────────────────────────
function buildPills() {
  const t = T[lang];
  const keys = ['p0','p1','p2','p3','p4','p5','p6','p7','p8','p9','p10','p11'];
  document.getElementById('navPills').innerHTML = keys.map((k,i) =>
    `<button class="pill${i===cur?' active':''}" onclick="goTo(${i})">${t[k]}</button>`
  ).join('');
}

// ─── TRANSLATE ────────────────────────────────────────────
function applyLang() {
  const t = T[lang];
  document.querySelectorAll('.t[data-key]').forEach(el => {
    const v = t[el.dataset.key];
    if (v !== undefined) el.textContent = v;
  });
  document.getElementById('btn-en').className = 'lang-btn'+(lang==='en'?' active':'');
  document.getElementById('btn-vn').className = 'lang-btn'+(lang==='vn'?' active':'');
  buildPills();
}
function setLang(l) { lang = l; applyLang(); }

// ─── NAVIGATION ───────────────────────────────────────────
function goTo(n) {
  document.getElementById('slide-'+cur)?.classList.remove('active');
  cur = Math.max(0, Math.min(SLIDES-1, n));
  document.getElementById('slide-'+cur)?.classList.add('active');
  buildPills();
  document.getElementById('counter').textContent = (cur+1)+' / '+SLIDES;
  window.scrollTo({top:0,behavior:'smooth'});
  initChartsForSlide(cur);
}
function next() { goTo(cur+1); }
function prev() { goTo(cur-1); }
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') next();
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') prev();
});

// ─── CHARTS ───────────────────────────────────────────────
const chartInstances = {};
function makeChart(id, config) {
  if (chartInstances[id]) { chartInstances[id].destroy(); }
  const el = document.getElementById(id);
  if (!el) return;
  chartInstances[id] = new Chart(el, config);
}
const COLORS = ['#eb4422','#1a73e8','#34a853','#fbbc04','#9c27b0'];
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

        indexAxis:'y', responsive:true, maintainAspectRatio:false,
        scales:{
          x:{ stacked:true, max:100, ticks:{ callback: v=>v+'%' }, grid:{color:'#f0f0ee'} },
          y:{ stacked:true, grid:{display:false} }
        },
        plugins:{ legend:{display:false},
          tooltip:{ callbacks:{ label: ctx=>` ${ctx.dataset.label}: ${ctx.raw}%` } } }
      }
    });
  }
  if (n === 11) {
    makeChart('chartRisk', {
      type:'bubble',
      data:{
        datasets:[
          { label:'Daniel consistency', data:[{x:8,y:9,r:12}], backgroundColor:hexToRgba('#e53935',.75) },
          { label:'Crawler freshness',  data:[{x:5,y:6,r:9}],  backgroundColor:hexToRgba('#fb8c00',.75) },
          { label:'Gallery DM response',data:[{x:6,y:7,r:10}], backgroundColor:hexToRgba('#fb8c00',.75) },
          { label:'Buyer intent',       data:[{x:4,y:5,r:8}],  backgroundColor:hexToRgba('#fb8c00',.75) },
          { label:'Julius bandwidth',   data:[{x:3,y:4,r:7}],  backgroundColor:hexToRgba('#43a047',.75) },
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        scales:{
          x:{ min:0, max:10, title:{display:true,text:'Likelihood',font:{size:11}} },
          y:{ min:0, max:10, title:{display:true,text:'Severity',font:{size:11}} }
        },
        plugins:{ legend:{ position:'right', labels:{font:{size:11}, boxWidth:10} } }
      }
    });
  }
}

// ─── INIT ─────────────────────────────────────────────────
buildPills();
applyLang();
initChartsForSlide(0);
</script>
